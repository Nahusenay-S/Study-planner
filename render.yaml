services:
  - type: web
    name: study-planner
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: study-planner-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # User must set this manually in Render UI

databases:
  - name: study-planner-db
    plan: free
